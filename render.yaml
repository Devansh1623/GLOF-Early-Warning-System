services:

  # ── Backend API — NEW service name forces Render to create it fresh ───────────
  - type: web
    name: glof-ews-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && PYTHONPATH=$(pwd) bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MONGO_URI
        value: "mongodb+srv://GLOF:GLOF12345@cluster0.k0lwbmf.mongodb.net/glof_db?appName=Cluster0"
      - key: JWT_SECRET_KEY
        value: "glof_himalaya_secret_2024"
      - key: REDIS_URL
        value: "rediss://default:gQAAAAAAAYmwAAIocDFhYWY1NWQwMzJkMzM0OGFiOGRhMjBlMTZkNTRhZWU1M3AxMTAwNzg0@pretty-locust-100784.upstash.io:6379"
      - key: RESEND_API_KEY
        value: "re_apqkKThT_NQpndwxmopgUBazsdHXT4tE1"
      - key: RESEND_FROM_EMAIL
        value: "GLOFWatch <onboarding@resend.dev>"
      - key: CORS_ORIGINS
        value: "https://glof-frontend.onrender.com"
      - key: ADMIN_EMAIL
        value: "devanshgeria18@gmail.com"
      - key: ADMIN_PASSWORD
        value: "Devansh@2024"
      - key: ADMIN_NAME
        value: "Devansh"

  # ── Frontend (React Static Site) ─────────────────────────────────────────────
  - type: web
    name: glof-frontend
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: "https://glof-ews-api.onrender.com"
