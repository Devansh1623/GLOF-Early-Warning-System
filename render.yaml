services:

  # ── Backend API + Celery Worker (same dyno) ──────────────────────────────────
  # Celery runs as a background thread via start.sh — no paid worker needed
  - type: web
    name: glof-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "GLOFWatch <onboarding@resend.dev>"
      - key: REDIS_URL
        value: "rediss://default:gQAAAAAAAYmwAAIocDFhYWY1NWQwMzJkMzM0OGFiOGRhMjBlMTZkNTRhZWU1M3AxMTAwNzg0@pretty-locust-100784.upstash.io:6379"
      - key: CORS_ORIGINS
        value: "https://glof-frontend.onrender.com"

  # ── Frontend (React Static Site — always free) ────────────────────────────────
  - type: web
    name: glof-frontend
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: "https://glof-backend.onrender.com"
