services:

  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: glof-ews-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && PYTHONPATH=$(pwd) bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: "https://glof-frontend.onrender.com"
      - key: RESEND_FROM_EMAIL
        value: "GLOFWatch <onboarding@resend.dev>"
      # ── Secrets — set these manually in the Render dashboard, never in git ──
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false

  # ── Frontend (React Static Site) ─────────────────────────────────────────────
  - type: web
    name: glof-frontend
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: "https://glof-ews-api.onrender.com"
