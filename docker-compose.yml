services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glof_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-GLOFWatch <onboarding@resend.dev>}

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glof_worker
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "celery_app.celery_app", "worker", "-Q", "notifications", "--loglevel=info"]
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-GLOFWatch <onboarding@resend.dev>}

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: glof_simulator
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:5000
      - INTERVAL_SECONDS=5
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
    container_name: glof_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
